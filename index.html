<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-white text-slate-900 antialiased">
    <div class="mx-auto flex min-h-screen w-full max-w-md flex-col px-4 py-6 sm:px-5">
      <main class="mt-8 flex-1">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-950 sm:text-4xl">Enter the code we sent you</h1>
        <p class="mt-3 max-w-xl text-base leading-7 text-slate-500">
          We sent it to <span class="font-semibold text-slate-900">alabioluwatobi830@gmail.com</span> to verify.
        </p>

        <div class="mt-10 sm:p-8">
          <div class="grid grid-cols-6 gap-2 sm:gap-3">
            <input inputmode="numeric" pattern="[0-9]*" maxlength="1" type="tel" autocomplete="one-time-code" class="code-input h-16 w-full rounded-3xl border border-slate-200 bg-slate-50 text-center text-2xl font-semibold text-slate-900 shadow-sm transition focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
            <input inputmode="numeric" pattern="[0-9]*" maxlength="1" type="tel" autocomplete="one-time-code" class="code-input h-16 w-full rounded-3xl border border-slate-200 bg-slate-50 text-center text-2xl font-semibold text-slate-900 shadow-sm transition focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
            <input inputmode="numeric" pattern="[0-9]*" maxlength="1" type="tel" autocomplete="one-time-code" class="code-input h-16 w-full rounded-3xl border border-slate-200 bg-slate-50 text-center text-2xl font-semibold text-slate-900 shadow-sm transition focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
            <input inputmode="numeric" pattern="[0-9]*" maxlength="1" type="tel" autocomplete="one-time-code" class="code-input h-16 w-full rounded-3xl border border-slate-200 bg-slate-50 text-center text-2xl font-semibold text-slate-900 shadow-sm transition focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
            <input inputmode="numeric" pattern="[0-9]*" maxlength="1" type="tel" autocomplete="one-time-code" class="code-input h-16 w-full rounded-3xl border border-slate-200 bg-slate-50 text-center text-2xl font-semibold text-slate-900 shadow-sm transition focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
            <input inputmode="numeric" pattern="[0-9]*" maxlength="1" type="tel" autocomplete="one-time-code" class="code-input h-16 w-full rounded-3xl border border-slate-200 bg-slate-50 text-center text-2xl font-semibold text-slate-900 shadow-sm transition focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200" />
          </div>

          <div class="mt-6 space-y-3 text-sm text-slate-500 sm:text-base">
            <p>
              Don’t see it?
              <button id="resendButton" type="button" disabled class="ml-1 font-semibold text-slate-900 transition hover:text-slate-950 disabled:cursor-not-allowed disabled:text-slate-400">
                Retry in 27 seconds
              </button>
            </p>
            <p id="errorText" class="text-sm font-medium text-red-600 opacity-0 transition-opacity duration-200">invalid code. Double-check and enter it again</p>
          </div>

          <div class="mt-8 space-y-3">
            <button id="checkEmailButton" class="w-full rounded-full bg-slate-900 px-5 py-4 text-base font-semibold text-white transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400">Check your email</button>
            <button id="continueButton" class="w-full rounded-full border border-slate-900 bg-white px-5 py-4 text-base font-semibold text-slate-950 transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-400">Continue</button>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
