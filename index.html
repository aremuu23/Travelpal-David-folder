<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Travelpal Welcome</title>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="min-h-screen px-4 py-8 sm:px-6 lg:px-8">
      <div class="mx-auto flex max-w-md flex-col items-center justify-center gap-8">
        <div class="relative w-full max-w-[380px]">
          <img
            src="Rectangle 1064-2.png"
            alt="Peach background shape"
            class="absolute -left-10 top-8 h-56 w-56 rounded-full object-cover opacity-95 sm:-left-14 sm:top-6 sm:h-64 sm:w-64"
          />
          <img
            src="Rectangle 1063-3.png"
            alt="Blue background shape"
            class="absolute -right-8 bottom-2 h-72 w-72 rounded-full object-cover opacity-100 sm:-right-12 sm:bottom-0 sm:h-80 sm:w-80"
          />
          <div class="relative mx-auto w-full overflow-hidden rounded-[2.75rem] sm:rounded-[3.25rem]">
            <img
              src="Frame 429-3.png"
              alt="Travelpal hero image"
              class="relative h-full w-full object-cover"
            />
            <div class="absolute left-5 bottom-5 inline-flex h-14 w-14 items-center justify-center w-16 h-16 rounded-full border-4 border-white bg-orange-500 shadow-xl">
              <img
                src="clarity_airplane-solid.png"
                alt="Airplane icon"
                class="h-7 w-7 object-contain"
              />
            </div>
          </div>
        </div>

        <div class="text-center">
          <h1 class="text-3xl font-semibold tracking-tight text-slate-950 sm:text-4xl">
            Welcome to Travelpal
          </h1>
          <p class="mx-auto mt-4 max-w-[320px] text-sm leading-6 text-slate-500 sm:text-base">
            Find your people, find your place. A travel that connects you.
          </p>
        </div>

        <button
          id="getStarted"
          class="inline-flex w-full items-center justify-center rounded-full bg-[#08182D] px-6 py-4 text-base font-semibold text-white transition duration-200 hover:bg-[#1A365D] focus:outline-none focus:ring-4 focus:ring-slate-300"
        >
          Get Started
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
